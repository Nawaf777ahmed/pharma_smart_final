<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>أنت غير متصل | PharmaSmart ERP</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f4f6f8; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { text-align: center; padding: 48px 32px; background: white; border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 480px; }
        .icon { font-size: 64px; margin-bottom: 24px; }
        h1 { font-size: 22px; color: #063955; font-weight: 900; margin-bottom: 12px; }
        p { color: #64748b; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
        .btn { display: inline-block; background: #063955; color: white; padding: 12px 28px; border-radius: 4px; font-weight: 700; font-size: 14px; text-decoration: none; cursor: pointer; border: none; }
        .btn:hover { background: #0a4f72; }
        .badge { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; padding: 8px 16px; border-radius: 4px; font-size: 12px; font-weight: 700; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <div class="badge">⚠️ لا يوجد اتصال بالإنترنت</div>
        <h1>أنت في وضع عدم الاتصال</h1>
        <p>
            يمكنك العودة إلى <strong>نقطة البيع (POS)</strong> التي تعمل محلياً حتى بدون إنترنت.
            الفواتير ستُحفظ تلقائياً وتُزامن عند عودة الاتصال.
        </p>
        <button class="btn" onclick="window.history.back()">← العودة لنقطة البيع</button>
    </div>
</body>
</html>
